name: Release Management

on:
  push:
    paths:
      - 'CHANGELOG.md'
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  process-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
      should_release: ${{ steps.check-release.outputs.should_release }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Extract latest version from changelog
        id: extract-version
        run: |
          VERSION=$(grep -m 1 '## \[[0-9]' CHANGELOG.md | sed -E 's/## \[([^]]+)\].*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Check if release already exists
        id: check-release
        run: |
          if ! git ls-remote --tags origin | grep -q "refs/tags/v${{ steps.extract-version.outputs.version }}"; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "No existing release found, will create new release"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release already exists, skipping"
          fi

  update-files:
    needs: process-version
    if: needs.process-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update .toc version and generate RELEASE.md
        run: |
          VERSION="${{ needs.process-version.outputs.version }}"

          # Ensure we're on the latest main
          git fetch origin main
          git checkout main
          git pull origin main

          # Set up remote with token for authentication
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Conditionally update .toc
          CURRENT_VERSION=$(grep "## Version:" PreyMate.toc | sed -E 's/## Version: (.*)/\1/')
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            sed -i "s/## Version: .*$/## Version: $VERSION/" PreyMate.toc
            git add PreyMate.toc
          fi

          # Always generate RELEASE.md
          HEADER=$(grep -m 1 "## \[$VERSION\]" CHANGELOG.md)
          NOTES=$(awk "/^## \\[$VERSION\\]/{p=1;next} /^## \\[/{p=0} p" CHANGELOG.md)
          {
            echo "$HEADER"
            echo ""
            echo "[Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
            echo ""
            printf '%s' "$NOTES"
          } > RELEASE.md
          git add RELEASE.md

          # Commit and push only if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "Update files for version $VERSION"
            git push origin main
          else
            echo "No file changes to commit"
          fi

  create-release:
    needs: [process-version, update-files]
    if: needs.process-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
      
      - name: Pull latest
        run: |
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Create tag
        run: |
          git tag -a "v${{ needs.process-version.outputs.version }}" -m "Version ${{ needs.process-version.outputs.version }}"
          git push origin "v${{ needs.process-version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: "v${{ needs.process-version.outputs.version }}"
          name: "Version ${{ needs.process-version.outputs.version }}"
          body_path: RELEASE.md
          draft: false
          prerelease: false
